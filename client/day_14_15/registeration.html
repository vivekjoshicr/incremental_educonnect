<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduConnect Registration</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body {
            background-color: #f8f9fa;
        }

        .register-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card">
        <h2 class="text-center mb-4">Registration</h2>

        <div class="mb-3">
            <label for="registerName" class="form-label">Name</label>
            <input type="text" id="registerName" class="form-control" placeholder="Enter your name" />
        </div>

        <div class="mb-3">
            <label for="registerEmail" class="form-label">Email</label>
            <input type="email" id="registerEmail" class="form-control" placeholder="Enter your email" />
        </div>

        <div class="mb-3">
            <label for="registerUsername" class="form-label">Username</label>
            <input type="text" id="registerUsername" class="form-control" placeholder="Choose a username" />
        </div>

        <div class="mb-3">
            <label for="registerPassword" class="form-label">Password</label>
            <input type="password" id="registerPassword" class="form-control" placeholder="Choose a password" />
            <div class="form-text">
                Password must be at least 8 characters long, contain one capital letter and one number.
            </div>
        </div>

        <div class="d-grid">
            <button type="button" class="btn btn-success" onclick="register()">Register</button>
        </div>
    </div>
</div>

<script src="validation.js"></script>
</body>
</html>
